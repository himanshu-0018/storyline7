<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRT Dashboard — God-Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing:border-box;margin:0;padding:0; }
        body { font-family:'Inter',sans-serif;background:#0a0e1a;color:#e2e8f0;overflow-x:hidden;min-height:100vh; }
        .bg-container { position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none; }
        .bg-photo { position:absolute;inset:0;background-image:url('/bg.jpg');background-size:cover;background-position:center;opacity:0.18;filter:brightness(1.1) saturate(1.3) hue-rotate(10deg);animation:bgZoom 50s ease-in-out infinite alternate; }
        @keyframes bgZoom { 0%{transform:scale(1);} 100%{transform:scale(1.06);} }
        .bg-gradient { position:absolute;inset:0;background:radial-gradient(ellipse at 0% 0%,rgba(245,158,11,0.25) 0%,transparent 50%),radial-gradient(ellipse at 100% 0%,rgba(14,165,233,0.20) 0%,transparent 50%),radial-gradient(ellipse at 100% 100%,rgba(16,185,129,0.18) 0%,transparent 50%),linear-gradient(135deg,rgba(10,14,26,0.82) 0%,rgba(15,20,40,0.78) 100%); }
        .bg-grid { position:absolute;inset:0;background-image:linear-gradient(rgba(245,158,11,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(245,158,11,0.06) 1px,transparent 1px);background-size:50px 50px;animation:gridDrift 40s linear infinite; }
        @keyframes gridDrift { 0%{transform:translate(0,0);} 100%{transform:translate(50px,50px);} }
        .orb { position:absolute;border-radius:50%;filter:blur(60px);animation:orbFloat 15s ease-in-out infinite; }
        .orb-1 { width:400px;height:400px;background:rgba(245,158,11,0.12);top:-100px;left:-100px;animation-duration:18s; }
        .orb-2 { width:350px;height:350px;background:rgba(14,165,233,0.12);top:20%;right:-80px;animation-duration:22s;animation-delay:3s; }
        .orb-3 { width:300px;height:300px;background:rgba(16,185,129,0.10);bottom:10%;left:20%;animation-duration:16s;animation-delay:6s; }
        @keyframes orbFloat { 0%,100%{transform:translate(0,0) scale(1);} 33%{transform:translate(30px,-40px) scale(1.1);} 66%{transform:translate(-20px,30px) scale(0.95);} }
        .scan-beam { position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(245,158,11,0.6),rgba(251,191,36,0.8),rgba(245,158,11,0.6),transparent);animation:scanMove 10s ease-in-out infinite;box-shadow:0 0 20px rgba(245,158,11,0.4); }
        @keyframes scanMove { 0%{top:0%;opacity:0;} 10%{opacity:1;} 90%{opacity:1;} 100%{top:100%;opacity:0;} }

        .top-bar { position:relative;z-index:10;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;border-bottom:1px solid rgba(255,255,255,0.08);background:rgba(10,14,26,0.6);backdrop-filter:blur(20px); }
        .brand-name { font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;letter-spacing:0.05em;background:linear-gradient(135deg,#fbbf24,#f59e0b,#d97706);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
        .brand-sub { font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:rgba(148,163,184,0.65);letter-spacing:0.12em;margin-top:2px; }
        .ctrl-btn { display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:10px;font-size:0.72rem;font-weight:700;letter-spacing:0.04em;cursor:pointer;transition:all 0.2s ease;border:1px solid;backdrop-filter:blur(10px);font-family:'JetBrains Mono',monospace;text-decoration:none; }
        .ctrl-btn:hover { transform:translateY(-2px); }
        .btn-back { background:linear-gradient(135deg,rgba(99,102,241,0.25),rgba(14,165,233,0.15));border-color:rgba(99,102,241,0.5);color:#a5b4fc; }
        .btn-clear { background:linear-gradient(135deg,rgba(239,68,68,0.25),rgba(153,27,27,0.15));border-color:rgba(239,68,68,0.5);color:#fca5a5; }
        .btn-sound { background:rgba(30,41,59,0.7);border-color:rgba(71,85,105,0.5);color:#94a3b8; }
        .btn-sound:hover { border-color:rgba(100,116,139,0.8);color:#cbd5e1; }
        .btn-sound.on { background:linear-gradient(135deg,rgba(16,185,129,0.2),rgba(52,211,153,0.1));border-color:rgba(16,185,129,0.5);color:#34d399;box-shadow:0 0 20px rgba(16,185,129,0.15); }
        .live-badge { display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3); }
        .live-badge.offline { background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3); }
        .pulse-dot { width:7px;height:7px;border-radius:50%;background:#10b981;position:relative; }
        .pulse-dot::after { content:'';position:absolute;inset:-3px;border-radius:50%;background:rgba(16,185,129,0.4);animation:pulseRing 1.5s ease-in-out infinite; }
        .offline .pulse-dot { background:#ef4444; }
        .offline .pulse-dot::after { background:rgba(239,68,68,0.4); }
        @keyframes pulseRing { 0%,100%{transform:scale(0.9);opacity:0.9;} 50%{transform:scale(1.5);opacity:0;} }
        .stat-chip { display:inline-flex;align-items:center;gap:8px;padding:7px 14px;border-radius:10px;background:rgba(15,23,42,0.7);border:1px solid rgba(255,255,255,0.07); }

        .stats-bar { position:relative;z-index:10;display:flex;align-items:center;gap:8px;padding:10px 24px;border-bottom:1px solid rgba(255,255,255,0.05);background:rgba(8,12,22,0.5);backdrop-filter:blur(10px);flex-wrap:wrap; }
        .stats-pill { display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:999px;font-size:0.68rem;font-weight:700;font-family:'JetBrains Mono',monospace; }
        .sp-bull { background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:#34d399; }
        .sp-bear { background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#f87171; }
        .sp-total { background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.25);color:#fbbf24; }
        .sp-tf { background:rgba(14,165,233,0.12);border:1px solid rgba(14,165,233,0.25);color:#38bdf8; }
        .sp-tp { background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.25);color:#34d399; }
        .sp-inv { background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);color:#f87171; }
        .divider-v { width:1px;height:16px;background:rgba(255,255,255,0.1); }

        .main-layout { position:relative;z-index:10;display:flex;gap:16px;padding:16px 24px;flex:1;overflow:hidden;height:calc(100vh - 130px); }
        .coin-section { flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(245,158,11,0.3) transparent; }
        .coin-section::-webkit-scrollbar { width:4px; }
        .coin-section::-webkit-scrollbar-thumb { background:rgba(245,158,11,0.3);border-radius:4px; }
        .coin-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px; }

        .crt-card { border-radius:16px;padding:16px;position:relative;overflow:hidden;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);cursor:default; }
        .crt-card::before { content:'';position:absolute;inset:0;border-radius:16px;padding:1px;background:linear-gradient(135deg,rgba(255,255,255,0.1),rgba(255,255,255,0.02));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none; }
        .crt-card:hover { transform:translateY(-4px) scale(1.01); }
        .crt-card-idle { background:linear-gradient(135deg,rgba(15,23,42,0.85),rgba(20,30,55,0.80));border:1px solid rgba(255,255,255,0.07);opacity:0.7; }
        .crt-card-bull { background:linear-gradient(135deg,rgba(5,46,22,0.9) 0%,rgba(6,78,59,0.75) 50%,rgba(15,30,50,0.85) 100%);border:1px solid rgba(16,185,129,0.4);box-shadow:0 0 30px rgba(16,185,129,0.12),0 8px 32px rgba(0,0,0,0.4); }
        .crt-card-bull::after { content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#10b981,#34d399,#10b981,transparent);animation:shimmer 3s ease-in-out infinite; }
        .crt-card-bear { background:linear-gradient(135deg,rgba(69,10,10,0.9) 0%,rgba(127,29,29,0.75) 50%,rgba(15,20,45,0.85) 100%);border:1px solid rgba(239,68,68,0.4);box-shadow:0 0 30px rgba(239,68,68,0.12),0 8px 32px rgba(0,0,0,0.4); }
        .crt-card-bear::after { content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#ef4444,#f87171,#ef4444,transparent);animation:shimmer 3s ease-in-out infinite; }
        .crt-card-mixed { background:linear-gradient(135deg,rgba(30,20,50,0.9) 0%,rgba(50,30,80,0.75) 50%,rgba(15,20,45,0.85) 100%);border:1px solid rgba(167,139,250,0.4);box-shadow:0 0 30px rgba(167,139,250,0.12),0 8px 32px rgba(0,0,0,0.4); }
        .crt-card-mixed::after { content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#a78bfa,#c4b5fd,#a78bfa,transparent);animation:shimmer 3s ease-in-out infinite; }
        @keyframes shimmer { 0%,100%{opacity:0.5;} 50%{opacity:1;} }

        .crt-sym { font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:800;color:#f1f5f9; }
        .crt-badge { font-family:'JetBrains Mono',monospace;font-size:0.55rem;font-weight:700;letter-spacing:0.1em;padding:3px 8px;border-radius:6px; }
        .crt-badge-bull { background:linear-gradient(135deg,rgba(16,185,129,0.3),rgba(52,211,153,0.15));border:1px solid rgba(52,211,153,0.4);color:#6ee7b7; }
        .crt-badge-bear { background:linear-gradient(135deg,rgba(239,68,68,0.3),rgba(248,113,113,0.15));border:1px solid rgba(248,113,113,0.4);color:#fca5a5; }
        .crt-badge-mixed { background:linear-gradient(135deg,rgba(167,139,250,0.3),rgba(196,181,253,0.15));border:1px solid rgba(167,139,250,0.4);color:#c4b5fd; }
        .crt-badge-idle { background:rgba(71,85,105,0.3);border:1px solid rgba(71,85,105,0.4);color:#64748b; }
        .crt-time { font-family:'JetBrains Mono',monospace;font-size:0.48rem;color:rgba(148,163,184,0.4);margin-top:3px; }

        /* TF rows with status */
        .tf-table-crt { width:100%;border-collapse:collapse;margin-top:10px; }
        .tf-table-crt th { font-family:'JetBrains Mono',monospace;font-size:0.42rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:rgba(148,163,184,0.4);padding:4px 5px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.06); }
        .tf-table-crt th:first-child { text-align:left; }
        .tf-table-crt td { font-family:'JetBrains Mono',monospace;font-size:0.55rem;font-weight:600;padding:6px 5px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.04); }
        .tf-table-crt td:first-child { text-align:left; }
        .td-side-bull { color:#34d399; }
        .td-side-bear { color:#f87171; }
        .td-side-none { color:#64748b; }
        .td-val { color:rgba(203,213,225,0.7);cursor:pointer; }
        .td-val:hover { color:#fbbf24; }

        .status-badge { font-family:'JetBrains Mono',monospace;font-size:0.45rem;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:0.06em; }
        .status-active { background:rgba(14,165,233,0.2);border:1px solid rgba(14,165,233,0.4);color:#38bdf8; }
        .status-tp { background:rgba(16,185,129,0.2);border:1px solid rgba(16,185,129,0.4);color:#34d399; }
        .status-invalid { background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.4);color:#f87171; }
        .status-none { background:rgba(71,85,105,0.2);border:1px solid rgba(71,85,105,0.3);color:#64748b; }

        .feed-panel { width:300px;flex-shrink:0;display:flex;flex-direction:column;border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,0.07);background:rgba(8,12,22,0.85);backdrop-filter:blur(24px); }
        .feed-header { padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.06);background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(251,191,36,0.08));display:flex;align-items:center;justify-content:space-between;flex-shrink:0; }
        .feed-title { font-family:'Orbitron',sans-serif;font-size:0.65rem;font-weight:700;color:#fbbf24;letter-spacing:0.1em; }
        .feed-body { flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:rgba(245,158,11,0.3) transparent; }
        .feed-body::-webkit-scrollbar { width:4px; }
        .feed-body::-webkit-scrollbar-thumb { background:rgba(245,158,11,0.3);border-radius:4px; }
        .feed-count { font-family:'JetBrains Mono',monospace;font-size:0.5rem;color:rgba(251,191,36,0.5); }

        .log-card { padding:10px 12px;border-radius:10px;animation:logSlide 0.3s ease-out; }
        .log-card-bull { background:linear-gradient(135deg,rgba(5,46,22,0.8),rgba(6,78,59,0.4));border:1px solid rgba(16,185,129,0.25);border-left:3px solid #10b981; }
        .log-card-bear { background:linear-gradient(135deg,rgba(69,10,10,0.8),rgba(127,29,29,0.4));border:1px solid rgba(239,68,68,0.25);border-left:3px solid #ef4444; }
        .log-card-tp { background:linear-gradient(135deg,rgba(5,46,22,0.8),rgba(6,78,59,0.4));border:1px solid rgba(16,185,129,0.4);border-left:3px solid #34d399; }
        .log-card-inv { background:linear-gradient(135deg,rgba(50,20,20,0.8),rgba(80,30,30,0.4));border:1px solid rgba(239,68,68,0.4);border-left:3px solid #ef4444; }
        @keyframes logSlide { from{opacity:0;transform:translateX(12px);} to{opacity:1;transform:translateX(0);} }
        .log-sym { font-family:'JetBrains Mono',monospace;font-size:0.75rem;font-weight:700;color:#f1f5f9; }
        .log-msg { font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:rgba(203,213,225,0.75);margin-top:3px; }
        .log-time { font-family:'JetBrains Mono',monospace;font-size:0.5rem; }
        .log-tf-tag { font-family:'JetBrains Mono',monospace;font-size:0.42rem;font-weight:700;padding:2px 5px;border-radius:4px;background:rgba(245,158,11,0.15);color:#fbbf24;border:1px solid rgba(245,158,11,0.3); }

        .empty-state { font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:rgba(148,163,184,0.3);text-align:center;padding:40px 0;grid-column:1/-1; }
        @keyframes logoGlow { 0%,100%{box-shadow:0 0 25px rgba(245,158,11,0.4);} 50%{box-shadow:0 0 40px rgba(251,191,36,0.5);} }
        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:rgba(245,158,11,0.3);border-radius:4px; }
    </style>
</head>
<body style="display:flex;flex-direction:column;height:100vh;overflow:hidden;">

    <div class="bg-container">
        <div class="bg-photo"></div><div class="bg-gradient"></div><div class="bg-grid"></div>
        <div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
        <div class="scan-beam"></div>
    </div>

    <div class="top-bar">
        <div style="display:flex;align-items:center;gap:14px;">
            <div style="width:42px;height:42px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,#f59e0b,#d97706,#b45309);display:flex;align-items:center;justify-content:center;font-size:1.3rem;animation:logoGlow 4s ease-in-out infinite;">🔄</div>
            <div>
                <div class="brand-name">CRT DASHBOARD</div>
                <div class="brand-sub">CANDLE RANGE THEORY · 1W · 1D · 4H · LIVE LIFECYCLE</div>
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <a href="/" class="ctrl-btn btn-back"><span>⚡</span> MAIN</a>
            <button onclick="clearAllCRT()" class="ctrl-btn btn-clear"><span>🗑️</span> CLEAR</button>
            <button id="audioBtn" onclick="toggleAudio()" class="ctrl-btn btn-sound">
                <span id="audioIco">🔇</span><span id="audioTxt">SOUND OFF</span>
            </button>
            <div class="stat-chip">
                <span style="font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:rgba(148,163,184,0.5);letter-spacing:0.08em;">COINS</span>
                <span id="activeCount" style="font-family:'JetBrains Mono',monospace;font-size:0.85rem;font-weight:800;color:#fbbf24;">0</span>
            </div>
            <div class="live-badge" id="liveBadge">
                <div class="pulse-dot" id="pulseDot"></div>
                <span id="liveLabel" style="font-family:'JetBrains Mono',monospace;font-size:0.7rem;font-weight:700;color:#34d399;">LIVE</span>
            </div>
        </div>
    </div>

    <div class="stats-bar">
        <span style="font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:rgba(148,163,184,0.35);letter-spacing:0.12em;text-transform:uppercase;">CRT Scan</span>
        <div class="divider-v"></div>
        <span id="bullPill" class="stats-pill sp-bull">🐂 0 BULL</span>
        <span id="bearPill" class="stats-pill sp-bear">🐻 0 BEAR</span>
        <div class="divider-v"></div>
        <span id="activePill" class="stats-pill sp-tf">🔵 0 ACTIVE</span>
        <span id="tpPill" class="stats-pill sp-tp">🎯 0 TP HIT</span>
        <span id="invPill" class="stats-pill sp-inv">❌ 0 INVALID</span>
        <div class="divider-v"></div>
        <span id="totalPill" class="stats-pill sp-total">🔄 0 TRACKED</span>
    </div>

    <div class="main-layout">
        <div class="coin-section">
            <div class="coin-grid" id="coinGrid">
                <p class="empty-state">Awaiting CRT signals...</p>
            </div>
        </div>
        <div class="feed-panel">
            <div class="feed-header">
                <span class="feed-title">📡 CRT FEED</span>
                <span class="feed-count" id="feedCount">0</span>
            </div>
            <div class="feed-body" id="activityFeed">
                <p style="font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:rgba(148,163,184,0.3);text-align:center;padding:20px 0;">Waiting for CRT signals...</p>
            </div>
        </div>
    </div>

    <script>
        const CRT_TFS = ['1W', '1D', '4H'];
        let crtState = {};
        let crtLog = [];

        const moneySound = new Audio('/money.mp3');
        moneySound.volume = 0.85;
        let audioOn = false;

        function toggleAudio() {
            audioOn = !audioOn;
            document.getElementById('audioIco').textContent = audioOn ? '🔊' : '🔇';
            document.getElementById('audioTxt').textContent = audioOn ? 'SOUND ON' : 'SOUND OFF';
            document.getElementById('audioBtn').className = 'ctrl-btn btn-sound' + (audioOn ? ' on' : '');
            if (audioOn) { moneySound.currentTime=0; moneySound.play().catch(()=>{}); }
        }
        function playSound() { if (!audioOn) return; moneySound.currentTime=0; moneySound.play().catch(()=>{}); }

        async function clearAllCRT() {
            if (!confirm('Clear all CRT data?')) return;
            await fetch('/api/delete-crt', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({symbol:'ALL'}) });
        }

        function fmtTime(ts) {
            if (!ts) return '';
            const d = new Date(ts);
            const old = Date.now() - ts > 86400000;
            const t = d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
            return old ? d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' '+t : t;
        }

        function copyVal(val, e) {
            if (!val || val === '---') return;
            navigator.clipboard.writeText(val);
            const t = document.createElement('div');
            t.textContent = '📋 ' + val;
            t.style.cssText = `position:fixed;z-index:999;pointer-events:none;left:${e.clientX+10}px;top:${e.clientY-30}px;font-family:'JetBrains Mono',monospace;font-size:0.65rem;font-weight:700;padding:5px 12px;border-radius:8px;background:rgba(245,158,11,0.92);color:white;border:1px solid rgba(251,191,36,0.6);transition:all 0.4s ease;`;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity='0'; t.style.transform='translateY(-10px)'; }, 700);
            setTimeout(() => t.remove(), 1100);
        }

        function getCardType(sym) {
            const data = crtState[sym];
            if (!data) return 'idle';
            const activeSides = CRT_TFS.map(tf => data[tf]?.side).filter(s => s);
            if (activeSides.length === 0) return 'idle';
            const allBull = activeSides.every(s => s === 'BULLISH');
            const allBear = activeSides.every(s => s === 'BEARISH');
            if (allBull) return 'bull';
            if (allBear) return 'bear';
            return 'mixed';
        }

        function statusBadge(status) {
            if (status === 'ACTIVE')  return '<span class="status-badge status-active">🔵 ACTIVE</span>';
            if (status === 'TP_HIT')  return '<span class="status-badge status-tp">🎯 TP HIT</span>';
            if (status === 'INVALID') return '<span class="status-badge status-invalid">❌ INVALID</span>';
            return '<span class="status-badge status-none">—</span>';
        }

        function sideClass(side) {
            if (side === 'BULLISH') return 'td-side-bull';
            if (side === 'BEARISH') return 'td-side-bear';
            return 'td-side-none';
        }

        function sideEmoji(side) {
            if (side === 'BULLISH') return '🐂';
            if (side === 'BEARISH') return '🐻';
            return '—';
        }

        function render() {
            const grid = document.getElementById('coinGrid');
            const syms = Object.keys(crtState).sort((a, b) => {
                const pa = { bull:3, bear:3, mixed:2, idle:0 }[getCardType(a)] || 0;
                const pb = { bull:3, bear:3, mixed:2, idle:0 }[getCardType(b)] || 0;
                if (pa !== pb) return pb - pa;
                // Secondary sort: most recent first
                const ta = Math.max(...CRT_TFS.map(tf => crtState[a]?.[tf]?.timestamp || 0));
                const tb = Math.max(...CRT_TFS.map(tf => crtState[b]?.[tf]?.timestamp || 0));
                return tb - ta;
            });

            // Stats
            let totalBull=0, totalBear=0, totalActive=0, totalTP=0, totalInv=0;
            syms.forEach(sym => {
                CRT_TFS.forEach(tf => {
                    const d = crtState[sym]?.[tf];
                    if (!d) return;
                    if (d.side === 'BULLISH') totalBull++;
                    if (d.side === 'BEARISH') totalBear++;
                    if (d.status === 'ACTIVE') totalActive++;
                    if (d.status === 'TP_HIT') totalTP++;
                    if (d.status === 'INVALID') totalInv++;
                });
            });

            document.getElementById('activeCount').textContent = syms.length;
            document.getElementById('bullPill').textContent = `🐂 ${totalBull} BULL`;
            document.getElementById('bearPill').textContent = `🐻 ${totalBear} BEAR`;
            document.getElementById('activePill').textContent = `🔵 ${totalActive} ACTIVE`;
            document.getElementById('tpPill').textContent = `🎯 ${totalTP} TP HIT`;
            document.getElementById('invPill').textContent = `❌ ${totalInv} INVALID`;
            document.getElementById('totalPill').textContent = `🔄 ${syms.length} TRACKED`;

            if (!syms.length) {
                grid.innerHTML = '<p class="empty-state">Awaiting CRT signals...</p>';
                return;
            }

            grid.innerHTML = '';
            syms.forEach(sym => {
                const data = crtState[sym];
                const type = getCardType(sym);
                const cardCls = type === 'bull' ? 'crt-card-bull' : type === 'bear' ? 'crt-card-bear' : type === 'mixed' ? 'crt-card-mixed' : 'crt-card-idle';
                const badgeCls = type === 'bull' ? 'crt-badge-bull' : type === 'bear' ? 'crt-badge-bear' : type === 'mixed' ? 'crt-badge-mixed' : 'crt-badge-idle';
                const badgeTxt = type === 'bull' ? '🐂 BULLISH' : type === 'bear' ? '🐻 BEARISH' : type === 'mixed' ? '🔀 MIXED' : '—';

                let latestTs = 0;
                CRT_TFS.forEach(tf => { if (data[tf]?.timestamp > latestTs) latestTs = data[tf].timestamp; });

                // Table rows for each TF
                let tfRows = '';
                CRT_TFS.forEach(tf => {
                    const d = data[tf];
                    if (!d || !d.side) {
                        tfRows += `<tr>
                            <td class="td-side-none">${tf}</td>
                            <td class="td-side-none">—</td>
                            <td class="td-side-none">—</td>
                            <td class="td-side-none">—</td>
                            <td class="td-side-none">—</td>
                            <td class="td-side-none">—</td>
                            <td>${statusBadge(null)}</td>
                        </tr>`;
                    } else {
                        tfRows += `<tr>
                            <td class="${sideClass(d.side)}">${tf} ${sideEmoji(d.side)}</td>
                            <td class="td-val" onclick="copyVal('${d.rej}',event)">${d.rej||'---'}</td>
                            <td class="td-val" onclick="copyVal('${d.bo}',event)">${d.bo||'---'}</td>
                            <td class="td-val" onclick="copyVal('${d.ext}',event)">${d.ext||'---'}</td>
                            <td class="td-val" onclick="copyVal('${d.tgt}',event)">${d.tgt||'---'}</td>
                            <td style="font-size:0.48rem;color:rgba(148,163,184,0.4);">${fmtTime(d.timestamp)}</td>
                            <td>${statusBadge(d.status)}</td>
                        </tr>`;
                    }
                });

                grid.insertAdjacentHTML('beforeend', `
                    <div class="crt-card ${cardCls}">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
                            <div>
                                <div class="crt-sym">${sym}</div>
                                <div class="crt-time">🕐 ${latestTs ? fmtTime(latestTs) : 'N/A'}</div>
                            </div>
                            <span class="crt-badge ${badgeCls}">${badgeTxt}</span>
                        </div>
                        <table class="tf-table-crt">
                            <thead><tr>
                                <th>TF</th><th>REJ</th><th>BO</th><th>EXT</th><th>TGT</th><th>TIME</th><th>STATUS</th>
                            </tr></thead>
                            <tbody>${tfRows}</tbody>
                        </table>
                    </div>`);
            });
        }

        function rebuildFeed() {
            const feed = document.getElementById('activityFeed');
            const countEl = document.getElementById('feedCount');

            if (!crtLog.length) {
                feed.innerHTML = `<p style="font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:rgba(148,163,184,0.3);text-align:center;padding:20px 0;">Waiting for CRT signals...</p>`;
                countEl.textContent = '0';
                return;
            }

            countEl.textContent = crtLog.length;
            feed.innerHTML = crtLog.slice(0, 100).map(e => {
                let cls;
                if (e.action === 'CRT_TARGET') cls = 'log-card log-card-tp';
                else if (e.action === 'CRT_INVALID') cls = 'log-card log-card-inv';
                else if (e.side === 'BULLISH') cls = 'log-card log-card-bull';
                else cls = 'log-card log-card-bear';

                const tc = e.side === 'BULLISH' ? 'rgba(52,211,153,0.8)' : 'rgba(248,113,113,0.8)';
                const icon = e.action === 'CRT_TARGET' ? '🎯' : e.action === 'CRT_INVALID' ? '❌' : (e.side === 'BULLISH' ? '🐂' : '🐻');

                return `<div class="${cls}">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;">
                        <span class="log-sym">${icon} ${e.symbol}</span>
                        <div style="display:flex;align-items:center;gap:4px;">
                            ${e.tf ? `<span class="log-tf-tag">${e.tf}</span>` : ''}
                            <span class="log-time" style="color:${tc};">${fmtTime(e.timestamp)}</span>
                        </div>
                    </div>
                    <div class="log-msg">${e.message}</div>
                </div>`;
            }).join('');
        }

        // INIT
        fetch('/api/crt-state').then(r => r.json()).then(data => {
            crtState = data.crtState || {};
            crtLog = data.crtLog || [];
            render();
            rebuildFeed();
        });

        // SSE
        const es = new EventSource('/api/crt-stream');
        const dot = document.getElementById('pulseDot');
        const lbl = document.getElementById('liveLabel');
        const bdg = document.getElementById('liveBadge');

        es.onopen = () => { dot.className='pulse-dot';lbl.textContent='LIVE';lbl.style.color='#34d399';bdg.className='live-badge'; };
        es.onerror = () => { dot.className='pulse-dot offline';lbl.textContent='RECONNECTING';lbl.style.color='#f87171';bdg.className='live-badge offline'; };
        es.onmessage = e => {
            const data = JSON.parse(e.data);
            if (data.crtSound) { playSound(); return; }
            if (data.crtState) crtState = data.crtState;
            if (data.crtLog) crtLog = data.crtLog;
            render();
            rebuildFeed();
        };
    </script>
</body>
</html>
