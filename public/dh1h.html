<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D+4H+1H Aligned — God-Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing:border-box;margin:0;padding:0; }
        body {
            font-family:'Inter',sans-serif;
            background:#0a0e1a;color:#e2e8f0;
            overflow-x:hidden;min-height:100vh;
        }
        .bg-container {
            position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;
        }
        .bg-photo {
            position:absolute;inset:0;
            background-image:url('/bg.jpg');
            background-size:cover;background-position:center;
            opacity:0.18;filter:brightness(1.1) saturate(1.3) hue-rotate(10deg);
            animation:bgZoom 50s ease-in-out infinite alternate;
        }
        @keyframes bgZoom { 0%{transform:scale(1);} 100%{transform:scale(1.06);} }
        .bg-gradient {
            position:absolute;inset:0;
            background:
                radial-gradient(ellipse at 0% 0%,rgba(6,182,212,0.25) 0%,transparent 50%),
                radial-gradient(ellipse at 100% 0%,rgba(14,165,233,0.20) 0%,transparent 50%),
                radial-gradient(ellipse at 100% 100%,rgba(16,185,129,0.18) 0%,transparent 50%),
                radial-gradient(ellipse at 0% 100%,rgba(245,158,11,0.15) 0%,transparent 50%),
                linear-gradient(135deg,rgba(10,14,26,0.82) 0%,rgba(15,20,40,0.78) 100%);
        }
        .bg-grid {
            position:absolute;inset:0;
            background-image:
                linear-gradient(rgba(6,182,212,0.06) 1px,transparent 1px),
                linear-gradient(90deg,rgba(6,182,212,0.06) 1px,transparent 1px);
            background-size:50px 50px;
            animation:gridDrift 40s linear infinite;
        }
        @keyframes gridDrift { 0%{transform:translate(0,0);} 100%{transform:translate(50px,50px);} }
        .orb { position:absolute;border-radius:50%;filter:blur(60px);animation:orbFloat 15s ease-in-out infinite; }
        .orb-1 { width:400px;height:400px;background:rgba(6,182,212,0.12);top:-100px;left:-100px;animation-duration:18s; }
        .orb-2 { width:350px;height:350px;background:rgba(14,165,233,0.12);top:20%;right:-80px;animation-duration:22s;animation-delay:3s; }
        .orb-3 { width:300px;height:300px;background:rgba(16,185,129,0.10);bottom:10%;left:20%;animation-duration:16s;animation-delay:6s; }
        @keyframes orbFloat {
            0%,100%{transform:translate(0,0) scale(1);}
            33%{transform:translate(30px,-40px) scale(1.1);}
            66%{transform:translate(-20px,30px) scale(0.95);}
        }
        .scan-beam {
            position:absolute;left:0;right:0;height:1px;
            background:linear-gradient(90deg,transparent,rgba(6,182,212,0.6),rgba(34,211,238,0.8),rgba(6,182,212,0.6),transparent);
            animation:scanMove 10s ease-in-out infinite;
            box-shadow:0 0 20px rgba(6,182,212,0.4);
        }
        @keyframes scanMove { 0%{top:0%;opacity:0;} 10%{opacity:1;} 90%{opacity:1;} 100%{top:100%;opacity:0;} }

        .top-bar {
            position:relative;z-index:10;padding:16px 24px;
            display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
            border-bottom:1px solid rgba(255,255,255,0.08);
            background:rgba(10,14,26,0.6);backdrop-filter:blur(20px);
        }
        .brand-name {
            font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;letter-spacing:0.05em;
            background:linear-gradient(135deg,#67e8f9,#22d3ee,#06b6d4);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
        }
        .brand-sub {
            font-family:'JetBrains Mono',monospace;font-size:0.58rem;
            color:rgba(148,163,184,0.65);letter-spacing:0.12em;margin-top:2px;
        }
        .ctrl-btn {
            display:inline-flex;align-items:center;gap:6px;
            padding:7px 16px;border-radius:10px;
            font-size:0.72rem;font-weight:700;letter-spacing:0.04em;
            cursor:pointer;transition:all 0.2s ease;border:1px solid;
            backdrop-filter:blur(10px);font-family:'JetBrains Mono',monospace;
            text-decoration:none;
        }
        .ctrl-btn:hover { transform:translateY(-2px); }
        .btn-back {
            background:linear-gradient(135deg,rgba(99,102,241,0.25),rgba(14,165,233,0.15));
            border-color:rgba(99,102,241,0.5);color:#a5b4fc;
            box-shadow:0 0 20px rgba(99,102,241,0.15);
        }
        .btn-back:hover {
            background:linear-gradient(135deg,rgba(99,102,241,0.4),rgba(14,165,233,0.25));
            box-shadow:0 0 30px rgba(99,102,241,0.3);color:#c7d2fe;
        }
        .btn-sound {
            background:rgba(30,41,59,0.7);border-color:rgba(71,85,105,0.5);color:#94a3b8;
        }
        .btn-sound:hover { border-color:rgba(100,116,139,0.8);color:#cbd5e1; }
        .btn-sound.on {
            background:linear-gradient(135deg,rgba(16,185,129,0.2),rgba(52,211,153,0.1));
            border-color:rgba(16,185,129,0.5);color:#34d399;
            box-shadow:0 0 20px rgba(16,185,129,0.15);
        }
        .stat-chip {
            display:inline-flex;align-items:center;gap:8px;
            padding:7px 14px;border-radius:10px;
            background:rgba(15,23,42,0.7);border:1px solid rgba(255,255,255,0.07);
            backdrop-filter:blur(10px);
        }
        .live-badge {
            display:inline-flex;align-items:center;gap:6px;
            padding:7px 14px;border-radius:10px;
            background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);
            backdrop-filter:blur(10px);
        }
        .live-badge.offline { background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3); }
        .pulse-dot { width:7px;height:7px;border-radius:50%;background:#10b981;position:relative; }
        .pulse-dot::after {
            content:'';position:absolute;inset:-3px;border-radius:50%;
            background:rgba(16,185,129,0.4);animation:pulseRing 1.5s ease-in-out infinite;
        }
        .offline .pulse-dot { background:#ef4444; }
        .offline .pulse-dot::after { background:rgba(239,68,68,0.4); }
        @keyframes pulseRing { 0%,100%{transform:scale(0.9);opacity:0.9;} 50%{transform:scale(1.5);opacity:0;} }

        .stats-bar {
            position:relative;z-index:10;
            display:flex;align-items:center;gap:8px;padding:10px 24px;
            border-bottom:1px solid rgba(255,255,255,0.05);
            background:rgba(8,12,22,0.5);backdrop-filter:blur(10px);flex-wrap:wrap;
        }
        .stats-pill {
            display:inline-flex;align-items:center;gap:5px;
            padding:4px 12px;border-radius:999px;
            font-size:0.68rem;font-weight:700;font-family:'JetBrains Mono',monospace;
        }
        .sp-bull { background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:#34d399; }
        .sp-bear { background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#f87171; }
        .sp-total { background:rgba(6,182,212,0.12);border:1px solid rgba(6,182,212,0.25);color:#67e8f9; }
        .divider-v { width:1px;height:16px;background:rgba(255,255,255,0.1); }

        .main-layout {
            position:relative;z-index:10;
            display:flex;gap:16px;padding:16px 24px;
            flex:1;overflow:hidden;height:calc(100vh - 130px);
        }
        .coin-section { flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(6,182,212,0.3) transparent; }
        .coin-section::-webkit-scrollbar { width:4px; }
        .coin-section::-webkit-scrollbar-thumb { background:rgba(6,182,212,0.3);border-radius:4px; }
        .coin-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px; }

        .coin-card {
            border-radius:16px;padding:18px;position:relative;overflow:hidden;
            transition:all 0.3s cubic-bezier(0.4,0,0.2,1);cursor:default;
        }
        .coin-card::before {
            content:'';position:absolute;inset:0;border-radius:16px;padding:1px;
            background:linear-gradient(135deg,rgba(255,255,255,0.1),rgba(255,255,255,0.02));
            -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
            -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;
        }
        .coin-card:hover { transform:translateY(-4px) scale(1.01); }
        .card-bull {
            background:linear-gradient(135deg,rgba(5,46,22,0.9) 0%,rgba(6,78,59,0.75) 50%,rgba(15,30,50,0.85) 100%);
            border:1px solid rgba(16,185,129,0.4);
            box-shadow:0 0 30px rgba(16,185,129,0.12),0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(52,211,153,0.15);
        }
        .card-bull::after {
            content:'';position:absolute;top:0;left:0;right:0;height:2px;
            background:linear-gradient(90deg,transparent,#10b981,#34d399,#10b981,transparent);
            animation:shimmer 3s ease-in-out infinite;
        }
        .card-bear {
            background:linear-gradient(135deg,rgba(69,10,10,0.9) 0%,rgba(127,29,29,0.75) 50%,rgba(15,20,45,0.85) 100%);
            border:1px solid rgba(239,68,68,0.4);
            box-shadow:0 0 30px rgba(239,68,68,0.12),0 8px 32px rgba(0,0,0,0.4),inset 0 1px 0 rgba(248,113,113,0.15);
        }
        .card-bear::after {
            content:'';position:absolute;top:0;left:0;right:0;height:2px;
            background:linear-gradient(90deg,transparent,#ef4444,#f87171,#ef4444,transparent);
            animation:shimmer 3s ease-in-out infinite;
        }
        @keyframes shimmer { 0%,100%{opacity:0.5;} 50%{opacity:1;} }

        .card-symbol { font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;color:#f1f5f9;letter-spacing:0.02em;line-height:1; }
        .card-badge-bull {
            font-family:'JetBrains Mono',monospace;font-size:0.6rem;font-weight:700;letter-spacing:0.1em;
            padding:4px 10px;border-radius:6px;
            background:linear-gradient(135deg,rgba(16,185,129,0.3),rgba(52,211,153,0.15));
            border:1px solid rgba(52,211,153,0.4);color:#6ee7b7;
        }
        .card-badge-bear {
            font-family:'JetBrains Mono',monospace;font-size:0.6rem;font-weight:700;letter-spacing:0.1em;
            padding:4px 10px;border-radius:6px;
            background:linear-gradient(135deg,rgba(239,68,68,0.3),rgba(248,113,113,0.15));
            border:1px solid rgba(248,113,113,0.4);color:#fca5a5;
        }

        .tf-row { display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:12px; }
        .tf-cell {
            padding:10px 6px;border-radius:10px;
            font-family:'JetBrains Mono',monospace;font-size:0.55rem;text-align:center;
        }
        .tf-cell-bull {
            background:linear-gradient(135deg,rgba(16,185,129,0.2),rgba(16,185,129,0.08));
            border:1px solid rgba(16,185,129,0.3);
        }
        .tf-cell-bear {
            background:linear-gradient(135deg,rgba(239,68,68,0.2),rgba(239,68,68,0.08));
            border:1px solid rgba(239,68,68,0.3);
        }

        .align-bar {
            margin-top:10px;padding:8px 12px;border-radius:8px;
            font-family:'JetBrains Mono',monospace;font-size:0.6rem;
            display:flex;align-items:center;gap:8px;
            text-align:center;justify-content:center;
        }
        .align-bar-bull { background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:#34d399; }
        .align-bar-bear { background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#f87171; }

        .empty-state {
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            padding:80px 20px;text-align:center;
        }
        .empty-icon { font-size:3rem;margin-bottom:16px;opacity:0.4; }
        .empty-title {
            font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;
            color:rgba(148,163,184,0.5);margin-bottom:8px;
        }
        .empty-sub {
            font-family:'JetBrains Mono',monospace;font-size:0.7rem;
            color:rgba(148,163,184,0.3);
        }

        @keyframes logoGlow { 0%,100%{box-shadow:0 0 25px rgba(6,182,212,0.4);} 50%{box-shadow:0 0 40px rgba(34,211,238,0.5);} }
        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:rgba(6,182,212,0.3);border-radius:4px; }
    </style>
</head>
<body style="display:flex;flex-direction:column;height:100vh;overflow:hidden;">

    <div class="bg-container">
        <div class="bg-photo"></div>
        <div class="bg-gradient"></div>
        <div class="bg-grid"></div>
        <div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
        <div class="scan-beam"></div>
    </div>

    <div class="top-bar">
        <div style="display:flex;align-items:center;gap:14px;">
            <div style="width:42px;height:42px;border-radius:12px;flex-shrink:0;
                background:linear-gradient(135deg,#06b6d4,#22d3ee,#67e8f9);
                display:flex;align-items:center;justify-content:center;font-size:1.3rem;
                animation:logoGlow 4s ease-in-out infinite;">⚔️</div>
            <div>
                <div class="brand-name">D + 4H + 1H ALIGNED</div>
                <div class="brand-sub">SHOWING COINS WITH 1D · 4H · 1H ALL SAME DIRECTION · 3/3 FILTER</div>
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <a href="/" class="ctrl-btn btn-back"><span>◀</span> BACK TO MAIN</a>
            <button id="audioBtn" onclick="toggleAudio()" class="ctrl-btn btn-sound">
                <span id="audioIco">🔇</span><span id="audioTxt">SOUND OFF</span>
            </button>
            <div class="stat-chip">
                <span style="font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:rgba(148,163,184,0.5);letter-spacing:0.08em;">MATCHED</span>
                <span id="matchCounter" style="font-family:'JetBrains Mono',monospace;font-size:0.85rem;font-weight:800;color:#67e8f9;">0</span>
            </div>
            <div class="live-badge" id="liveBadge">
                <div class="pulse-dot" id="pulseDot"></div>
                <span id="liveLabel" style="font-family:'JetBrains Mono',monospace;font-size:0.7rem;font-weight:700;color:#34d399;">LIVE</span>
            </div>
        </div>
    </div>

    <div class="stats-bar">
        <span style="font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:rgba(148,163,184,0.35);letter-spacing:0.12em;text-transform:uppercase;">D+4H+1H Filter</span>
        <div class="divider-v"></div>
        <span id="bullPill" class="stats-pill sp-bull">🐂 0 BULLISH</span>
        <span id="bearPill" class="stats-pill sp-bear">🐻 0 BEARISH</span>
        <div class="divider-v"></div>
        <span id="totalPill" class="stats-pill sp-total">⚔️ 0 ALIGNED</span>
    </div>

    <div class="main-layout">
        <div class="coin-section">
            <div class="coin-grid" id="coinGrid">
                <div class="empty-state" style="grid-column:1/-1;">
                    <div class="empty-icon">⚔️</div>
                    <div class="empty-title">Scanning for D+4H+1H alignment...</div>
                    <div class="empty-sub">Coins with 1D + 4H + 1H all aligned will appear here</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const FILTER_TFS = ['1D', '4H', '1H'];
        const FILTER_API = '/api/filtered-state/dh1h';
        const FILTER_LABEL = 'D+4H+1H';

        const moneySound = new Audio('/money.mp3');
        moneySound.volume = 0.85;
        let audioOn = false;
        let prevSymbols = new Set();

        function toggleAudio() {
            audioOn = !audioOn;
            document.getElementById('audioIco').textContent = audioOn ? '🔊' : '🔇';
            document.getElementById('audioTxt').textContent = audioOn ? 'SOUND ON' : 'SOUND OFF';
            document.getElementById('audioBtn').className = 'ctrl-btn btn-sound' + (audioOn ? ' on' : '');
            if (audioOn) { moneySound.currentTime=0; moneySound.play().catch(()=>{}); }
        }
        function playSound() {
            if (!audioOn) return;
            moneySound.currentTime=0; moneySound.play().catch(()=>{});
        }

        function tfEmo(s) { return s==='BULLISH'?'🐂':s==='BEARISH'?'🐻':'—'; }
        function tfCellCls(s) { return s==='BULLISH'?'tf-cell-bull':s==='BEARISH'?'tf-cell-bear':''; }

        function filterState(ms) {
            const filtered = {};
            for (const sym in ms) {
                const tfs = ms[sym].timeframes || {};
                const vals = FILTER_TFS.map(tf => tfs[tf] || 'NONE');
                if (vals[0] !== 'NONE' && vals.every(v => v === vals[0])) {
                    filtered[sym] = ms[sym];
                    filtered[sym]._filterDir = vals[0];
                }
            }
            return filtered;
        }

        function render(ms) {
            const filtered = filterState(ms);
            const grid = document.getElementById('coinGrid');
            const syms = Object.keys(filtered).sort();

            const bulls = syms.filter(s => filtered[s]._filterDir === 'BULLISH').length;
            const bears = syms.filter(s => filtered[s]._filterDir === 'BEARISH').length;

            document.getElementById('matchCounter').textContent = syms.length;
            document.getElementById('bullPill').textContent = `🐂 ${bulls} BULLISH`;
            document.getElementById('bearPill').textContent = `🐻 ${bears} BEARISH`;
            document.getElementById('totalPill').textContent = `⚔️ ${syms.length} ALIGNED`;

            // Sound alert for new coins
            const currentSyms = new Set(syms);
            if (prevSymbols.size > 0) {
                for (const s of currentSyms) {
                    if (!prevSymbols.has(s)) playSound();
                }
            }
            prevSymbols = currentSyms;

            if (syms.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <div class="empty-icon">⚔️</div>
                        <div class="empty-title">No ${FILTER_LABEL} alignment found</div>
                        <div class="empty-sub">Waiting for 1D + 4H + 1H to align in same direction</div>
                    </div>`;
                return;
            }

            grid.innerHTML = '';
            syms.forEach(sym => {
                const d = filtered[sym];
                const tfs = d.timeframes || {};
                const dir = d._filterDir;
                const cardCls = dir === 'BULLISH' ? 'card-bull' : 'card-bear';
                const badgeCls = dir === 'BULLISH' ? 'card-badge-bull' : 'card-badge-bear';
                const badgeTxt = dir === 'BULLISH' ? '🐂 BULLISH 3/3' : '🐻 BEARISH 3/3';
                const barCls = dir === 'BULLISH' ? 'align-bar-bull' : 'align-bar-bear';
                const barTxt = dir === 'BULLISH' ? '✅ D+4H+1H BULLISH ALIGNED' : '✅ D+4H+1H BEARISH ALIGNED';

                let tfCells = '';
                FILTER_TFS.forEach(tf => {
                    tfCells += `
                        <div class="tf-cell ${tfCellCls(tfs[tf])}">
                            <div style="margin-bottom:4px;">
                                <span style="color:rgba(203,213,225,0.5);font-size:0.45rem;text-transform:uppercase;letter-spacing:.04em;">${tf}</span>
                            </div>
                            <div style="font-size:0.8rem;">${tfEmo(tfs[tf])}</div>
                            <div style="color:rgba(203,213,225,0.6);font-size:0.45rem;margin-top:2px;">${tfs[tf]||'NONE'}</div>
                        </div>`;
                });

                // Show full alignment context
                const allTfs = ['1W','1D','4H','1H','30M','15M'];
                const fullCount = allTfs.filter(tf => tfs[tf] === dir).length;

                grid.insertAdjacentHTML('beforeend', `
                    <div class="coin-card ${cardCls}">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
                            <div>
                                <div class="card-symbol">${sym}</div>
                                <div style="font-family:'JetBrains Mono',monospace;font-size:0.5rem;color:rgba(148,163,184,0.5);margin-top:3px;">
                                    Full alignment: ${fullCount}/6 ${dir}
                                </div>
                            </div>
                            <span class="${badgeCls}">${badgeTxt}</span>
                        </div>
                        <div class="tf-row">${tfCells}</div>
                        <div class="align-bar ${barCls}">${barTxt}</div>
                    </div>`);
            });
        }

        // Initial load
        fetch('/api/state').then(r=>r.json()).then(data => {
            render(data.marketState || data);
        });

        // Real-time SSE
        const es = new EventSource('/api/stream');
        const dot = document.getElementById('pulseDot');
        const lbl = document.getElementById('liveLabel');
        const bdg = document.getElementById('liveBadge');

        es.onopen = () => {
            dot.className='pulse-dot';lbl.textContent='LIVE';
            lbl.style.color='#34d399';bdg.className='live-badge';
        };
        es.onerror = () => {
            dot.className='pulse-dot offline';lbl.textContent='RECONNECTING';
            lbl.style.color='#f87171';bdg.className='live-badge offline';
        };
        es.onmessage = e => {
            const data = JSON.parse(e.data);
            if (data.soundAlert) { playSound(); return; }
            const ms = data.marketState || data;
            render(ms);
        };
    </script>
</body>
</html>
